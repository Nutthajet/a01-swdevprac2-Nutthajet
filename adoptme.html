<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>Adopt Me</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 40px;
      }

      .container {
        max-width: 600px;
        background: white;
        margin: auto;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #333;
      }

      p {
        text-align: center;
        color: #666;
      }

      h3 {
        margin-top: 25px;
        color: #444;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      .radio-group {
        display: flex;
        gap: 20px;
        margin: 10px 0;
      }

      .radio-group input {
        width: auto;
      }

      .radio-group label {
        margin-right: 15px;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }

      .footer {
        text-align: center;
        margin-top: 40px;
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>รับเลี้ยงสุนัข</h1>
      <p>ยินดีต้อนรับสู่หน้ารับเลี้ยงสุนัข มาหาเพื่อนตัวใหม่ของคุณกันเถอะ!</p>

      <h3>ข้อมูลผู้รับเลี้ยง</h3>

      <label>ชื่อ - นามสกุล</label>
      <input type="text" placeholder="กรอกชื่อ - นามสกุล" />

      <label>เบอร์ติดต่อ</label>
      <input type="text" placeholder="กรอกเบอร์ติดต่อ" />

      <label>email</label>
      <input type="email" placeholder="กรอกอีเมล" />

      <h3>สภาพแวดล้อมในการเลี้ยงดู</h3>

      <label>ข้อมูลที่อยู่</label>
      <input type="text" placeholder="กรอกที่อยู่" />

      <label>ลักษณะที่พักอาศัย</label>
      <select>
        <option>บ้านสวน</option>
        <option>บ้านเดี่ยว</option>
        <option>บ้านทาวน์โฮม</option>
        <option>คอนโดมิเนียม/หอพัก</option>
      </select>

      <label>ลักษณะการเลี้ยง</label>
      <div class="radio-group">
        <label><input type="radio" name="living" /> เลี้ยงสุนัขภายในบ้าน</label>
        <label><input type="radio" name="living" /> เลี้ยงสุนัขภายนอกบ้าน</label>
      </div>

      <label>จำนวนสัตว์เลี้ยงที่มีอยู่ปัจจุบัน</label>
      <input type="number" min="0" placeholder="กรอกจำนวนสัตว์เลี้ยง" />

      <div class="radio-group">
        <input type="checkbox" /> การส่งแบบฟอร์มนี้เป็นการแจ้งความสนใจ โดยไม่รับรองการได้รับอุปการะสุนัข
      </div>
      <button type="submit">ส่งข้อมูล</button>
    </div>
  </body>
  <footer class="footer">6833079021 นายณัฐเจษฎ์ ฝอยทอง</footer>
</html>
